<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Cow App</title>

<style>
body {
    margin: 0;
    overflow: hidden;
}

/* Full screen cow */
#cow {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    position: absolute;
    cursor: pointer;

    /* Idle animation */
    animation: move 2s infinite alternate ease-in-out;
}

/* Move animation */
@keyframes move {
    0% { transform: translateX(0px) rotate(0deg); }
    100% { transform: translateX(10px) rotate(1deg); }
}

/* Mouth */
#mouth {
    position: absolute;
    bottom: 35%;
    left: 50%;
    width: 60px;
    height: 15px;
    background: black;
    border-radius: 50%;
    transform: scaleY(0);
    transition: 0.1s;
}

.open {
    transform: scaleY(2);
}

/* Text */
#text {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    font-size: 40px;
    color: white;
    font-weight: bold;
    text-shadow: 2px 2px 8px black;
}
</style>

</head>

<body>

<img id="cow" src="Cow.jpg">
<div id="mouth"></div>
<div id="text"></div>

<script>

let cow = document.getElementById("cow");
let mouth = document.getElementById("mouth");
let text = document.getElementById("text");

let clickCount = 0;

// speech list
let speeches = [
    "Crystallography Crystallography Crystallography",
    "Diffraction Diffraction Diffraction",
    "Come sit in front of me Come sit in front of me"
];

cow.addEventListener("click", function() {

    let speech = speeches[clickCount % 3];
    clickCount++;

    speakWords(speech);

});

function speakWords(sentence) {

    let words = sentence.split(" ");
    let i = 0;

    let interval = setInterval(() => {

        // show word
        text.innerHTML = words.slice(0, i+1).join(" ");

        // mouth animation
        mouth.classList.add("open");

        setTimeout(() => {
            mouth.classList.remove("open");
        }, 150);

        i++;

        if(i >= words.length){
            clearInterval(interval);
        }

    }, 400);

}

</script>

</body>
</html>
