<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cow App</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
}

#field {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(#4CAF50, #8BC34A);
    position: relative;
}

#cow {
    position: absolute;
    bottom: 50px;
    left: 40%;
    width: 220px;
    cursor: pointer;
}

/* Mouth animation */
#mouth {
    position: absolute;
    bottom: 110px;
    left: 48%;
    width: 40px;
    height: 10px;
    background: black;
    border-radius: 50%;
    transform: scaleY(0);
    transition: 0.1s;
}

.open {
    transform: scaleY(2);
}

#textOutput {
    position: absolute;
    bottom: 300px;
    left: 30%;
    color: white;
    font-size: 26px;
    font-weight: bold;
}
</style>

</head>

<body>

<div id="field">

    <!-- ✅ LOCAL IMAGE -->
    <img id="cow" src="cow.jpg" alt="cow">

    <div id="mouth"></div>
    <div id="textOutput"></div>

</div>

<audio id="sound">
  <source src="https://www.soundjay.com/animal/cow-moo1.mp3" type="audio/mpeg">
</audio>

<script>

let cow = document.getElementById("cow");
let mouth = document.getElementById("mouth");
let text = document.getElementById("textOutput");
let sound = document.getElementById("sound");

cow.addEventListener("click", function() {

    // sound
    sound.currentTime = 0;
    sound.play();

    // mouth animation
    let i = 0;
    let anim = setInterval(() => {
        mouth.classList.toggle("open");
        i++;
        if(i > 6){
            clearInterval(anim);
            mouth.classList.remove("open");
        }
    }, 150);

    // text
    text.innerHTML = "Crystallography! Crystallography! Crystallography!";

    setTimeout(() => {
        text.innerHTML = "";
    }, 2000);

});

</script>

</body>
</html>
