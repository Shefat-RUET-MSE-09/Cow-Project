<!DOCTYPE html>
<html lang="en">
<head>
    <img src="cow.jpg">
<meta charset="UTF-8">
<title>Cow App</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#3cb371, #98fb98);
    font-family: Arial;
}

/* Field */
#field {
    width: 100vw;
    height: 100vh;
    position: relative;
}

/* Cow */
#cow {
    position: absolute;
    bottom: 50px;
    left: 40%;
    width: 220px;
    cursor: pointer;
    transition: 0.2s;
}

/* Rope */
#rope {
    position: absolute;
    bottom: 150px;
    left: 20%;
    width: 220px;
    height: 3px;
    background: brown;
}

/* Post */
#post {
    position: absolute;
    bottom: 50px;
    left: 20%;
    width: 10px;
    height: 100px;
    background: black;
}

/* Text */
#textOutput {
    position: absolute;
    bottom: 300px;
    left: 35%;
    color: white;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 2px 2px 5px black;
}
</style>

</head>

<body>

<div id="field">

    <div id="post"></div>
    <div id="rope"></div>

    <!-- Cow image (working link) -->
    <img id="cow" 
    src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Cow_female_black_white.jpg"
    alt="cow">

    <div id="textOutput"></div>

</div>

<!-- Sound -->
<audio id="sound">
    <source src="https://www.soundjay.com/animal/cow-moo1.mp3" type="audio/mpeg">
</audio>

<script>

let cow = document.getElementById("cow");
let sound = document.getElementById("sound");
let text = document.getElementById("textOutput");

cow.addEventListener("click", function() {

    // sound play
    sound.currentTime = 0;
    sound.play();

    // small animation (shake)
    cow.style.transform = "scale(1.1)";

    // show crystallography text
    text.innerHTML = "Crystallography! Crystallography! Crystallography!";

    // reset
    setTimeout(() => {
        cow.style.transform = "scale(1)";
        text.innerHTML = "";
    }, 2000);

});

</script>

</body>
</html>
