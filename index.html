<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cow App</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(green, lightgreen);
    font-family: Arial;
}

/* Field */
#field {
    width: 100vw;
    height: 100vh;
    position: relative;
}

/* Cow */
#cow {
    position: absolute;
    bottom: 50px;
    left: 40%;
    width: 200px;
    cursor: pointer;
    transition: 0.3s;
}

/* Rope */
#rope {
    position: absolute;
    bottom: 150px;
    left: 20%;
    width: 200px;
    height: 2px;
    background: brown;
}

/* Post */
#post {
    position: absolute;
    bottom: 50px;
    left: 20%;
    width: 10px;
    height: 100px;
    background: black;
}

/* Text output */
#textOutput {
    position: absolute;
    bottom: 300px;
    left: 40%;
    color: white;
    font-size: 24px;
    font-weight: bold;
}
</style>

</head>

<body>

<div id="field">

    <!-- Post -->
    <div id="post"></div>

    <!-- Rope -->
    <div id="rope"></div>

    <!-- Cow -->
    <img id="cow" src="https://i.imgur.com/6o5Vb9R.png">

    <!-- Text -->
    <div id="textOutput"></div>

</div>

<!-- Sound -->
<audio id="sound" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>

<script>

let cow = document.getElementById("cow");
let sound = document.getElementById("sound");
let text = document.getElementById("textOutput");

cow.addEventListener("click", function() {

    // Play sound
    sound.play();

    // Change cow image (mouth open)
    cow.src = "https://i.imgur.com/Z8bKQ9R.png";

    // Show text repeatedly
    text.innerHTML = "Crystallography Crystallography Crystallography";

    // Reset after 2 seconds
    setTimeout(() => {
        cow.src = "https://i.imgur.com/6o5Vb9R.png";
        text.innerHTML = "";
    }, 2000);

});

</script>

</body>
</html>
